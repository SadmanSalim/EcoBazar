<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoBazar</title>
    <link rel="shortcut icon" href="./assets/img/fav.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/responsive.css">
</head>
<body>
    <header>
                <!-- *Top bar Section start -->
        <section id="topBar">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-6 col-auto d-flex justify-content-lg-start m-auto align-items-center location">
                        <span><i class="fa-solid fa-location-dot"></i></span>
                        <p>Store Location: Lincoln- 344, Illinois, Chicago, USA</p>
                    </div>
                    <div class="col-lg-6 d-lg-flex justify-content-end align-items-center actionLinks d-none">
                        <form action="#">
                            <select id="">
                                <option>Eng</option>
                                <option>Bn</option>
                                <option>Hin</option>
                            </select>
                        </form>
                        <form action="#">
                            <select id="">
                                <option>Usd</option>
                                <option>Bdt</option>
                                <option>Rp</option>
                            </select>
                        </form>
                        <a href="#">Sign In / Sign Up</a>
                    </div>
                </div>
            </div>
        </section>
        <div class="searchBoxMobile">
            <input class="" type="search" placeholder="Search">
            <button class="">Search</button>
            <div class="background"></div>
        </div>
        <!-- *Top Bar Section end -->
                 <!-- *middle part Section start -->
         <section id="middleBar">
                <div class="container">
                    <div class="row align-items-center d-none d-lg-flex">
                        <div class="col-3">
                            <div class="logo"><a href="index.html"><img class="img-fluid" src="./assets/img/Logo.png" alt=""></a></div>
                        </div>
                        <div class="col-6 d-flex align-items-center justify-content-center search">
                            <div class="search_box">
                                <span><i class="fa-solid fa-magnifying-glass"></i></span>
                                <input type="search" placeholder="Search">
                            </div>
                            <button>Search</button>
                        </div>
                        <div class="col-3 d-flex quickLinks align-items-center justify-content-end">
                            <span><i class="fa-regular fa-heart"></i></span>
                            <div class="cartIcon d-flex align-items-center">
                                <div class="cartIc">
                                    <span><i class="fa-solid fa-bag-shopping"></i></span>
                                    <div class="quantity">2</div>
                                </div>
                                <div class="cartText">
                                    <p>Shopping Cart</p>
                                    <h5>$57.00</h5>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
         </section>
                 <!-- *middlePart mobile Section start -->
                  
         <section id="middleBarMobile">
                <div class="container">
                    <div class="row align-items-center d-lg-none">
                        <div class="col-3"><span><i class="fa-solid fa-bars"></i></span></div>
                        <div class="col-6 text-center">
                            <div class="logo">
                            <a href="index.html"><img src="./assets/img/Logo.png" alt=""></a>
                        </div>
                    </div>
                        <div class="col-3 text-end">
                            <span><i class="fa-solid fa-magnifying-glass mobSearch"></i></span>         
                        </div>
                    </div>
                </div>

                <section id="bottomNavMenu">
                    <div class="container">
                        <div class="row mt-2 d-lg-none">
                            <div class="col text-center"><span><i class="fa-solid fa-house"></i></span>
                            <p>Home</p></div>
                            <div class="col text-center"><span><i class="fa-solid fa-list"></i>
                            <p>Categories</p></div>
                            <div class="col text-center"><span><i class="fa-solid fa-cart-shopping"></i></span>
                            <p>Cart</p></div>
                            <div class="col text-center"><span><i class="fa-regular fa-user"></i></span>
                            <p>User</p></div>
                        </div>
                    </div>
                </section>
         </section>
         <!-- *middlePart mobile Section end -->
         <!-- *middle part Section end -->

         <!-- * Nav Bar Section Start -->
         <nav>
            
         </nav>

         <!-- * Nav Bar Section End -->
    </header>







    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/jquery-3.7.1.min.js"></script>
    <script src="https://kit.fontawesome.com/c98501bdbf.js" crossorigin="anonymous"></script>
    <script src="./assets/js/main.js"></script>
</body>
</html>
